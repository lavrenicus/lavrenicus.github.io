<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixiAndDestroy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'game-dark': '#1a1c2c',
            'game-gray': '#8d91a1',
            'game-blue': '#5d86ba',
            'game-red': '#b0305c',
            'game-gold': '#f4b41b',
          },
          fontFamily: { pixel: ['"Press Start 2P"', 'cursive'] }
        }
      }
    };
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; color: #8d91a1; font-family: 'Press Start 2P', cursive; }
    #app { width: 100vw; height: 100vh; position: relative; }
    #app canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    #state-ui {
      position: absolute; top: 8px; left: 8px; z-index: 1;
      background: rgba(0,0,0,0.75); color: #eee;
      font: 14px/1.4 monospace; padding: 8px 12px; border-radius: 6px;
      pointer-events: none; white-space: pre;
    }
    .pixel-border {
      border: 4px solid #8d91a1;
      background: #1a1c2c;
      padding: 8px;
      box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.5);
    }
    .hp-pip { width: 8px; height: 8px; background: #5d86ba; border: 1px solid white; }
    .hp-pip.red { background: #b0305c; }
    .hp-pip.empty { background: #333; border-color: #555; }
    .unit-card { position: relative; display: flex; align-items: center; gap: 8px; margin: 4px 6px 10px; padding: 8px 10px; border: 2px solid transparent; }
    .unit-card.active { border-color: #fff; }
    .unit-card.active .unit-card-underlay { opacity: 0.95; }
    .unit-card-underlay {
      position: absolute; inset: 0; z-index: -1;
      background: #0c0d12;
      border: 10px solid transparent;
      border-image-source: url("/textures/9-slice%20window.png");
      border-image-slice: 20;
      border-image-repeat: stretch;
      box-sizing: border-box;
    }
    .avatar {
      width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
      border: 2px solid #8d91a1; font-size: 8px; background: #2a2c3c; overflow: hidden;
      flex-shrink: 0;
    }
    .avatar-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    .avatar-flip-y .avatar-img { transform: scaleX(-1); }
    .hud-layer {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none; display: flex; flex-direction: column; padding: 15px;
    }
    .hud-layer .pointer-events-auto { pointer-events: auto; }
    .start-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10, 12, 20, 0.85);
      pointer-events: auto;
      cursor: pointer;
    }
    .start-overlay--hidden { display: none !important; }
    .start-overlay__text {
      font-size: 10px; color: #8d91a1; text-align: center;
      padding: 16px 24px;
      border: 4px solid #5d86ba;
      background: rgba(26, 28, 44, 0.9);
      box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4);
      max-width: 80%;
    }
    .start-overlay__text strong { color: #f4b41b; display: block; margin-bottom: 8px; }
  </style>
  <script type="module" crossorigin src="/assets/index-CQT3AN4U.js"></script>
</head>
<body>
  <div id="app">
    <div id="state-ui"></div>
    <div id="start-overlay" class="start-overlay" aria-label="Нажмите для старта">
      <p class="start-overlay__text">
        <strong>Кликните, чтобы начать</strong>
        Выберите юнита и сдвиньте его к пустой клетке
      </p>
    </div>
    <div class="hud-layer">
      <div class="flex justify-between items-start w-full">
        <div class="flex flex-col gap-2 pointer-events-auto">
          <div class="pixel-border border-game-red mb-2 text-[10px] text-white text-center">АРМИЯ AI</div>
          <div id="army-p2-list" class="flex flex-col gap-2"></div>
        </div>
        <div id="turn-indicator" class="pixel-border border-white text-white text-[10px] h-fit pointer-events-auto cursor-default">
          ВАШ ХОД
        </div>
        <div class="flex flex-col gap-2 items-end pointer-events-auto text-right">
          <div class="pixel-border border-game-blue mb-2 text-[10px] text-white text-center w-full">АРМИЯ P1</div>
          <div id="army-p1-list" class="flex flex-col gap-2"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
