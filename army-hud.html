<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridlockTactics - Army HUD Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'game-dark': '#1a1c2c',
                        'game-gray': '#8d91a1',
                        'game-blue': '#5d86ba',
                        'game-red': '#b0305c',
                        'game-gold': '#f4b41b',
                    },
                    fontFamily: {
                        pixel: ['"Press Start 2P"', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: transparent;
            color: #8d91a1;
            margin: 0;
            overflow: hidden;
            image-rendering: pixelated;
            font-family: 'Press Start 2P', cursive;
        }
        .pixel-border {
            border: 4px solid #8d91a1;
            background: #1a1c2c;
            padding: 8px;
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.5);
        }
        .hp-pip {
            width: 8px;
            height: 8px;
            background: #5d86ba;
            border: 1px solid white;
        }
        .hp-pip.red { background: #b0305c; }
        .hp-pip.empty { background: #333; border-color: #555; }
        
        .unit-card {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 4px;
            border: 2px solid transparent;
        }
        .unit-card.active { border-color: #fff; background: rgba(255,255,255,0.1); }

        .avatar {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #8d91a1;
            font-size: 8px;
            background: #2a2c3c;
        }
        
        .hud-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="hud-layer">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ: СПИСКИ ЮНИТОВ -->
        <div class="flex justify-between items-start w-full">
            
            <!-- АРМИЯ ИГРОКА 1 -->
            <div class="flex flex-col gap-2 pointer-events-auto">
                <div class="pixel-border border-game-blue mb-2 text-[10px] text-white text-center">АРМИЯ P1</div>
                
                <div class="unit-card active">
                    <div class="avatar border-game-gold text-game-gold">CMD</div>
                    <div>
                        <div class="text-[8px] text-white mb-1">КОМАНДИР</div>
                        <div class="flex gap-1">
                            <div class="hp-pip"></div><div class="hp-pip"></div>
                        </div>
                    </div>
                </div>

                <div class="unit-card">
                    <div class="avatar text-game-blue">ARC</div>
                    <div>
                        <div class="text-[8px] text-game-gray mb-1">ЛУЧНИК</div>
                        <div class="flex gap-1">
                            <div class="hp-pip"></div>
                        </div>
                    </div>
                </div>

                <div class="unit-card">
                    <div class="avatar text-game-blue">SWD</div>
                    <div>
                        <div class="text-[8px] text-game-gray mb-1">МЕЧНИК</div>
                        <div class="flex gap-1">
                            <div class="hp-pip"></div><div class="hp-pip"></div><div class="hp-pip"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ИНДИКАТОР ХОДА -->
            <div id="turn-indicator" class="pixel-border border-white text-white text-[10px] h-fit pointer-events-auto cursor-pointer" onclick="toggleTurn()">
                ВАШ ХОД
            </div>

            <!-- АРМИЯ ИИ -->
            <div class="flex flex-col gap-2 items-end pointer-events-auto text-right">
                <div class="pixel-border border-game-red mb-2 text-[10px] text-white text-center w-full">АРМИЯ AI</div>
                
                <div class="unit-card flex-row-reverse">
                    <div class="avatar border-game-gold text-game-gold">CMD</div>
                    <div>
                        <div class="text-[8px] text-white mb-1">КОМАНДИР</div>
                        <div class="flex gap-1 justify-end">
                            <div class="hp-pip red"></div><div class="hp-pip red"></div>
                        </div>
                    </div>
                </div>

                <div class="unit-card flex-row-reverse">
                    <div class="avatar text-game-red">SWD</div>
                    <div>
                        <div class="text-[8px] text-game-gray mb-1">МЕЧНИК</div>
                        <div class="flex gap-1 justify-end">
                            <div class="hp-pip red"></div><div class="hp-pip red"></div><div class="hp-pip red"></div>
                        </div>
                    </div>
                </div>

                <div class="unit-card flex-row-reverse">
                    <div class="avatar text-game-red">ARC</div>
                    <div>
                        <div class="text-[8px] text-game-gray mb-1">ЛУЧНИК</div>
                        <div class="flex gap-1 justify-end">
                            <div class="hp-pip red"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTurn() {
            const ind = document.getElementById('turn-indicator');
            const isPlayer = ind.innerText === "ВАШ ХОД";
            ind.innerText = isPlayer ? "ХОД ИИ" : "ВАШ ХОД";
            ind.style.borderColor = isPlayer ? "#b0305c" : "#fff";
            ind.style.color = isPlayer ? "#b0305c" : "#fff";
        }
    </script>
</body>
</html>
